services:
  mysql:
    image: mysql:latest
    container_name: crud-mysql
    environment:
      MYSQL_ROOT_USER: crud_db_user
      MYSQL_ROOT_PASSWORD: crud_db_pass
      MYSQL_DATABASE: crud_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data: